<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='1em' font-size='80'%3E🍔%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

<header class="header">
    <h1><a href="../index.html">🍔</a> Fast Food Deluxe</h1>
</header>

<section class="form-section">
    <h2>Connexion</h2>

    <form id="loginForm">

        <label>📧 Email :</label>
        <input type="email" id="loginEmail" required>

        <label>🔒 Mot de passe :</label>
        <div class="password-box">
            <input type="password" id="loginPassword" required>
            <span id="togglePassword">🔐</span>
        </div>

        <button class="btn">Se connecter</button>
    </form>
    <p class="register-link">
        Pas encore de compte ? 
        <a href="register.html">Créer un compte</a>
    </p>
</section>

<script src="../javascript/login.js"></script>

</body>
</html>
