<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Fast Food Deluxe</title>

    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

<header class="header">
    <h1><a href="../index.html">🍔</a> Fast Food Deluxe</h1>

    <nav>
        <a href="../index.html">Accueil</a>
        <a class="selected" href="products.html">Menu</a>
        <a href="buildbox.html">🍱 Build Box</a>
        <a href="order.html">Commander</a>
    </nav>
</header>

<section class="deluxe menu-deluxe">
    <div class="deluxe-content menu-deluxe-content">
        <span class="deluxe-badge">Notre selection</span>
        <h1>Notre menu gourmand</h1>
        <p>Choisissez vos plats preferes et trouvez rapidement ce que vous voulez deguster.</p>

        <div class="deluxe-actions">
            <a href="login.html" class="btn btn-secondary">Connexion</a>
            <a href="register.html" class="btn btn-outline">Inscription</a>
        </div>

        <div class="menu-toolbar">
            <input
                type="text"
                id="search"
                placeholder="Rechercher un produit..."
                onkeyup="searchProduct()"
            >

            <select id="filter" onchange="filterProducts()">
                <option value="all">Tous</option>
                <option value="burger">🍔 Burgers</option>
                <option value="pizza">🍕 Pizzas</option>
                <option value="tacos">🌮 Tacos</option>
                <option value="panini">🥪 Paninis</option>
                <option value="chapati">🌯 Chapati</option>
                <option value="libanais">🥙 Libanais</option>
                <option value="sandwich">🥖 Sandwiches</option>
                <option value="frites">🍟 Frites</option>
                <option value="plats">🍗 Plats</option>
                <option value="dessert">🍰 Desserts</option>
                <option value="glace">🍦 Glaces</option>
                <option value="milkshake">🥤 Milkshakes</option>
                <option value="extras">🍗 Extras</option>
                <option value="healthy">🥗 Healthy</option>
                <option value="turc">🇹🇷 Menu Turc</option>
                
            </select>
        </div>

        <h3 id="categoryTitle">Tous les produits</h3>
    </div>
</section>

<section id="productsContainer" class="products"></section>

<footer class="footer">
    <p>© 2026 Fast Food Deluxe - Tous droits reserves</p>
</footer>
<div id="popup" class="popup"></div>
<script src="../javascript/products.js"></script>
</body>
</html>
