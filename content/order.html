<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande - Fast Food Deluxe</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='1em' font-size='80'%3E🍔%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

<header class="header">
    <h1><a href="../index.html">🍔</a> Fast Food Deluxe</h1>

    <nav>
        <a href="../index.html">Accueil</a>
        <a href="products.html">Menu</a>
        <a href="buildbox.html">🍱 Build Box</a>
        <a class="selected" href="order.html">Panier</a>
    </nav>
</header>

<section class="deluxe order-deluxe">
    <div class="deluxe-content order-content">
        <h1>Finalise ton panier</h1>

        <div class="deluxe-actions">
            <a href="products.html" class="btn btn-secondary">Voir le menu</a>
            <a href="buildbox.html" class="btn btn-outline">Creer une box</a>
        </div>

        <div class="order-container">
            <div class="cart">
                <h2>🛍 Panier</h2>

                <div id="cartItems">
                    <p>Votre panier est vide</p>
                </div>

                <h5 id="totalCart"></h5>
                <button class="btn-vider" onclick="clearCart()"> Vider le panier</button>
            </div>

            <div class="box-order">

                <h2>Résumé commande</h2>

                <div class="resume-item">
                    <span>Total à payer</span>
                    <strong id="finalTotal" class="">0 DA</strong>
                </div>

                <div class="resume-item">
                    <span>Livraison</span>
                    <strong>Gratuite</strong>
                </div>

                <div class="resume-item">
                    <span>Paiement</span>
                    <strong>À la réception</strong>
                </div>

                <button class="btn-commander" onclick="validateOrder()">
                    Commander
                </button>

            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <p>© 2026 Fast Food Deluxe</p>
</footer>

<div id="orderPopup" class="popup-overlay hidden">

    <div class="popup-box">

        <h2>Finaliser la commande</h2>

        <div id="popupMessage" class="popup-message"></div>

        <input type="text" id="address" placeholder="Adresse de livraison">

        <input type="text" id="phone" placeholder="Numéro de téléphone">
        <div>
        <button onclick="confirmOrder()" class="btn-commander">
            Confirmer
        </button>

        <button onclick="closePopup()" class="btn-cancel">
            Annuler
        </button>
        </div>
    </div>

</div>

<script src="../javascript/order.js"></script>


</body>
</html>
