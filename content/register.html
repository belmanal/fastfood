<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>

    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

<header class="header">
   <h1><a href="../index.html">🍔</a> Fast Food Deluxe</h1>
</header>

<section class="form-section">
    <h2 id="title">Créer un compte</h2>

    <form id="registerForm">

        <label id="label-langue">🌍 Langue :</label>
<select id="langue">
    <option value="">Choisir</option>
    <option value="fr">Français</option>
    <option value="ar">Arabe</option>
    <option value="en">Anglais</option>
</select>

<label id="label-wilaya">📍 Wilaya :</label>
<select id="wilaya"></select>

<label id="label-name">👤 Prénom :</label>
<input type="text" id="name">

<label id="label-email">📧 Email :</label>
<input type="email" id="email">

<label id="label-password">🔒 Mot de passe :</label>
<input type="password" id="password">

<button class="btn" id="btn">S'inscrire</button>
    </form>
    <p class="login-link">
        Déjà un compte ?
        <a href="login.html">Se connecter</a>
    </p>
</section>

<script src="../javascript/register.js"></script>

</body>
</html>
